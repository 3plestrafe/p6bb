<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Physics Black Belt - Fishing</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;--surface:#141720;--surface2:#1c2030;
  --border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;
  --gold:#c9a96e;--gold-dim:rgba(201,169,110,0.12);
  --blue:#4a9eff;--green:#4ade80;--red:#f87171;--orange:#fb923c;
  --mono:'Courier New',monospace;--radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ── Nav ── */
nav.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
.nav-logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gold);letter-spacing:0.06em;text-decoration:none;}
.nav-logo em{font-style:normal;color:var(--text);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:5px 12px;font-size:11px;font-family:var(--mono);cursor:pointer;text-decoration:none;letter-spacing:0.04em;transition:border-color .15s;}
.nav-btn:hover{border-color:rgba(255,255,255,0.3);}
.coll-xp-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:7px 10px;background:var(--surface2);border:1px solid rgba(201,169,110,0.18);border-radius:8px;}
.coll-xp-label{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:0.06em;}
.coll-xp-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);}

/* ── Main layout: collection left, fishing right ── */
.main-scroll{flex:1;display:flex;flex-direction:row;align-items:flex-start;justify-content:center;padding:20px 16px;gap:16px;}
/* Collection column: fixed width, scrollable */
.collection-col{width:260px;flex-shrink:0;position:sticky;top:20px;}
/* Fishing column: takes remaining space up to max */
.fishing-col{flex:1;min-width:0;max-width:540px;display:flex;flex-direction:column;gap:0;}

/* ── Fishing window card ── */
.fish-window{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:540px;overflow:hidden;}

/* ── Window body: fixed layout so HOLD button never moves ── */
.window-body{padding:16px 20px;display:grid;grid-template-rows:auto auto auto 1fr;gap:12px;}
/* The selector block and minigame panel share the same grid row - minigame overlays the selectors */
.selector-block{display:flex;flex-direction:column;gap:12px;}
.mg-anchor{position:relative;}
.mg-panel{display:none;flex-direction:column;gap:7px;}
.mg-panel.active{display:flex;}
.hold-wrap{margin-top:14px;}

/* ── Water / rod scene ── */
.water-scene{position:relative;width:100%;height:160px;background:linear-gradient(180deg,#0a2a4a 0%,#051525 100%);overflow:hidden;}
.water-shimmer{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0px,rgba(74,158,255,0.04) 40px,transparent 80px);animation:shimmer 5s linear infinite;}
@keyframes shimmer{from{transform:translateX(-80px);}to{transform:translateX(80px);}}
.water-surface{position:absolute;top:55px;left:0;right:0;height:2px;background:rgba(74,158,255,0.25);}
.water-deep{position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(180deg,transparent,rgba(5,21,37,0.8));}
/* Ripples */
.ripple{position:absolute;top:55px;border-radius:50%;border:1px solid rgba(74,158,255,0.2);animation:ripple-out 3s ease-out infinite;opacity:0;}
.ripple:nth-child(1){left:38%;width:20px;height:8px;margin-top:-4px;animation-delay:0s;}
.ripple:nth-child(2){left:38%;width:40px;height:16px;margin-top:-8px;animation-delay:0.6s;}
.ripple:nth-child(3){left:38%;width:60px;height:24px;margin-top:-12px;animation-delay:1.2s;}
@keyframes ripple-out{0%{opacity:0.5;transform:translateX(-50%);}100%{opacity:0;transform:translateX(-50%) scale(1.4);}}
/* Rod */
.rod-wrap{position:absolute;top:0;right:48px;display:flex;flex-direction:column;align-items:center;}
.rod-icon{font-size:28px;transform:rotate(30deg);transform-origin:bottom center;line-height:1;}
.fishing-line{width:1px;background:rgba(255,255,255,0.35);transition:height .5s ease;}
/* Bobber */
.bobber{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff6b6b,#cc0000);border:1.5px solid white;box-shadow:0 0 6px rgba(255,100,100,0.4);}
.bobber.idle{animation:bob 2s ease-in-out infinite;}
.bobber.bite{animation:bite 0.3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(4px);}}
@keyframes bite{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(7px) rotate(5deg);}}
/* Scene status */
.scene-status{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);}
.scene-status.alert{color:var(--gold);animation:pulse .5s ease-in-out infinite alternate;}
@keyframes pulse{from{opacity:0.6;}to{opacity:1;}}

/* ── Window body ── */
.window-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.section-label{font-family:var(--mono);font-size:9px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}

/* ── Location row ── */
.location-row{display:flex;gap:8px;}
.loc-btn{flex:1;padding:9px 6px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);cursor:pointer;text-align:center;transition:border-color .2s,background .2s;}
.loc-btn:hover:not(.locked){border-color:rgba(255,255,255,0.2);}
.loc-btn.selected{border-color:var(--gold);background:var(--gold-dim);}
.loc-btn.locked{opacity:0.38;cursor:not-allowed;}
.loc-btn .loc-icon{font-size:20px;display:block;margin-bottom:3px;}
.loc-btn .loc-name{font-size:11px;font-weight:600;color:var(--text);display:block;}
.loc-btn .loc-tag{font-family:var(--mono);font-size:9px;color:var(--muted);display:block;margin-top:1px;}
.loc-btn .loc-lock{font-size:10px;color:var(--muted);display:block;margin-top:2px;}

/* ── Bait row ── */
.bait-row{display:flex;gap:8px;}
.bait-btn{flex:1;padding:8px 6px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);cursor:pointer;text-align:center;transition:border-color .2s,background .2s;}
.bait-btn:hover{border-color:rgba(255,255,255,0.2);}
.bait-btn.selected{border-color:var(--blue);background:rgba(74,158,255,0.08);}
.bait-btn .bait-icon{font-size:18px;display:block;margin-bottom:3px;}
.bait-btn .bait-name{font-size:11px;font-weight:600;color:var(--text);display:block;}
.bait-btn .bait-cost{font-family:var(--mono);font-size:10px;color:var(--gold);display:block;margin-top:2px;}
.bait-btn .bait-note{font-family:var(--mono);font-size:9px;color:var(--muted);display:block;margin-top:1px;}

/* ── Cast ── */
.cast-area{text-align:center;}
.btn-cast{background:var(--gold);color:#0d0f14;border:none;border-radius:8px;padding:11px 36px;font-size:14px;font-weight:700;font-family:var(--mono);letter-spacing:0.06em;cursor:pointer;transition:opacity .2s;}
.btn-cast:hover:not(:disabled){opacity:0.88;}
.btn-cast:disabled{opacity:0.35;cursor:not-allowed;}
.cast-hint{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono);}
.xp-warn{font-size:11px;color:var(--red);margin-top:4px;font-family:var(--mono);}

/* ── Minigame panel ── */
.mg-panel{display:none;flex-direction:column;gap:7px;}
.mg-panel.active{display:flex;}
.mg-header{display:flex;align-items:center;justify-content:space-between;}
.mg-fish-name{font-size:13px;font-weight:700;}
.state-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;letter-spacing:0.04em;}
.s-reel  {background:rgba(74,222,128,0.15);color:#4ade80;}
.s-orange{background:rgba(251,146,60,0.15);color:#fb923c;}
.s-free  {background:rgba(248,113,113,0.12);color:#f87171;}
.tug-log{font-family:var(--mono);font-size:10px;color:var(--muted);min-height:13px;opacity:0.8;}

/* Fish bar */
.fish-bar-wrap{position:relative;width:100%;height:42px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
.snap-warn{position:absolute;left:0;top:0;bottom:0;width:8%;background:rgba(248,113,113,0.12);border-right:2px dashed #f87171;pointer-events:none;}
.fish-zone{position:absolute;top:0;bottom:0;background:rgba(74,222,128,0.22);border-left:2px solid #4ade80;border-right:2px solid #4ade80;}
.fish-zone.orange{background:rgba(251,146,60,0.20);border-color:#fb923c;}
.fish-zone.off{background:rgba(248,113,113,0.14);border-color:#f87171;}
.fish-dot{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:20px;line-height:1;z-index:2;}
.bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);}

/* Stat rows */
.stat-row{display:flex;align-items:center;gap:6px;}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--muted);width:70px;flex-shrink:0;}
.stat-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.stat-fill{height:100%;border-radius:3px;}
.stat-val{font-family:var(--mono);font-size:9px;color:var(--muted);width:34px;text-align:right;flex-shrink:0;}

/* Fish status label */
.fish-status-label{font-size:17px;font-weight:700;font-family:'Segoe UI Rounded','Segoe UI',system-ui,sans-serif;letter-spacing:0.01em;margin-top:10px;text-align:center;min-height:26px;}

/* Catch flash rarity sizing */
.catch-rarity-common   {font-family:var(--mono);font-size:11px;color:#9ca3af;letter-spacing:0.06em;}
.catch-rarity-uncommon {font-family:var(--mono);font-size:13px;color:var(--blue);letter-spacing:0.06em;font-weight:700;}
.catch-rarity-legendary{font-family:'Segoe UI Rounded','Segoe UI',system-ui,sans-serif;font-size:18px;color:var(--gold);font-weight:800;text-shadow:0 0 14px rgba(201,169,110,0.6),0 0 28px rgba(201,169,110,0.3);letter-spacing:0.04em;}
.catch-rarity-trash    {font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;}

/* Hold button */
.btn-hold{width:100%;padding:12px;font-size:15px;font-weight:700;font-family:var(--mono);border:2px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);cursor:pointer;user-select:none;touch-action:none;-webkit-user-select:none;letter-spacing:0.06em;transition:background .1s,border-color .1s,color .1s;}
.btn-hold.held{background:rgba(74,222,128,0.12);border-color:var(--green);color:var(--green);}

/* ── Collection panel ── */
.collection-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;}
.coll-header{margin-bottom:10px;}
.coll-title{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
/* Total pts - playful rounded glow */
.coll-total-display{
  font-family:'Segoe UI Rounded','Segoe UI',system-ui,sans-serif;
  font-size:28px;font-weight:800;
  color:var(--gold);
  text-shadow:0 0 12px rgba(201,169,110,0.55),0 0 28px rgba(201,169,110,0.25);
  letter-spacing:-0.01em;
  margin-top:2px;
}
.coll-total-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.coll-list{display:flex;flex-direction:column;gap:5px;max-height:calc(100vh - 200px);overflow-y:auto;}
.coll-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.coll-icon{flex-shrink:0;width:44px;height:64px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:4px;}
.coll-icon img{width:44px;height:64px;object-fit:contain;image-rendering:pixelated;}
.coll-icon-emoji{font-size:22px;}
.coll-info{flex:1;min-width:0;}
.coll-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.coll-pts-each{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
.coll-right{text-align:right;flex-shrink:0;}
.coll-count{font-family:var(--mono);font-size:12px;color:var(--text);}
.coll-item-pts{
  font-family:'Segoe UI Rounded','Segoe UI',system-ui,sans-serif;
  font-size:11px;font-weight:700;
  color:var(--gold);
  text-shadow:0 0 6px rgba(201,169,110,0.4);
}
.coll-empty{color:var(--muted);font-size:11px;text-align:center;padding:24px 0;font-family:var(--mono);}
/* rarity accent */
.coll-item.legendary{border-left:3px solid var(--gold);}
.coll-item.uncommon{border-left:3px solid var(--blue);}
.coll-item.common{border-left:3px solid #4b5563;}
.coll-item.trash{border-left:3px solid #374151;}

/* ── Catch flash ── */
#catch-flash{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;}
#catch-flash.active{display:flex;}
.catch-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 32px;text-align:center;max-width:320px;width:90%;animation:pop-in .3s cubic-bezier(.175,.885,.32,1.275);}
.catch-box.success{border-color:var(--green);}
.catch-box.fail{border-color:var(--orange);}
.catch-box.trash-catch{border-color:var(--muted);}
@keyframes pop-in{from{transform:scale(0.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.catch-emoji-big{font-size:48px;margin-bottom:8px;}
.catch-title{font-size:19px;font-weight:700;margin-bottom:5px;}
.catch-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:14px;}
.catch-item-row{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:11px 14px;margin-bottom:14px;text-align:left;}
.catch-item-icon{width:52px;height:75px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.catch-item-icon img{width:52px;height:75px;object-fit:contain;image-rendering:pixelated;}
.catch-item-icon-emoji{font-size:36px;}
.catch-item-name{font-size:14px;font-weight:600;}
.catch-item-pts{font-family:var(--mono);font-size:10px;color:var(--gold);margin-top:2px;}
.btn-back{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 24px;font-size:12px;font-family:var(--mono);cursor:pointer;transition:border-color .2s;letter-spacing:0.04em;}
.btn-back:hover{border-color:rgba(255,255,255,0.3);}

/* ── XP toast ── */
#xp-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 20px;font-family:var(--mono);font-size:13px;color:var(--gold);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300;}
#xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="app.html">PHYSICS <em>BLACK BELT</em></a>
  <div class="nav-right">
    <div id="nav-xp-badge" style="display:none;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(201,169,110,0.25);border-radius:20px;padding:4px 12px;letter-spacing:0.04em;">
      ⚡ <span id="nav-xp">0</span> XP
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="nav-btn" id="btn-mute" onclick="toggleMute()" title="Toggle sound" style="padding:5px 8px;">🔇</button>
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.6"
        oninput="setVolume(this.value)"
        style="width:70px;height:4px;accent-color:var(--gold);cursor:pointer;opacity:0.4;pointer-events:none;"
        disabled title="Volume"/>
    </div>
    <a class="nav-btn" href="app.html" style="text-decoration:none;">← Dashboard</a>
    <button class="nav-btn" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="main-scroll">

  <!-- ══ LEFT: COLLECTION ══ -->
  <div class="collection-col">
    <div class="collection-wrap">
      <div class="coll-header">
        <div style="display:flex;align-items:baseline;justify-content:space-between;">
          <div class="coll-title">📦 Collection</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.08em;">v0.91</div>
        </div>
        <div class="coll-total-display" id="coll-total-pts">0</div>
        <div class="coll-total-label">total points</div>
        <div class="coll-xp-row">
          <span class="coll-xp-label">⚡ XP</span>
          <span class="coll-xp-val" id="coll-xp-val">0</span>
        </div>
      </div>
      <div class="coll-list" id="coll-list"></div>
    </div>
  </div>

  <!-- ══ RIGHT: FISHING CARD ══ -->
  <div class="fishing-col">
    <div class="fish-window">

      <!-- Water / rod scene -->
      <div class="water-scene" id="water-scene">
        <div class="water-shimmer"></div>
        <div class="water-surface"></div>
        <div class="water-deep"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="rod-wrap" id="rod-wrap">
          <div class="rod-icon">🎣</div>
          <div class="fishing-line" id="fishing-line" style="height:0px"></div>
          <div class="bobber" id="bobber"></div>
        </div>
        <div class="scene-status" id="scene-status"></div>
      </div>

      <!-- Window body -->
      <div class="window-body">

        <!-- Selectors -->
        <div class="selector-block" id="selector-block">
          <div id="location-section">
            <div class="section-label">Location</div>
            <div class="location-row" id="location-row"></div>
          </div>
          <div id="bait-section">
            <div class="section-label">Bait</div>
            <div class="bait-row" id="bait-row"></div>
          </div>
          <div class="cast-area" id="cast-area">
            <button class="btn-cast" id="btn-cast" onclick="startCast()">🎣 Cast Rod</button>
            <div class="cast-hint" id="cast-hint">Select a location and bait</div>
            <div class="xp-warn" id="xp-warn" style="display:none"></div>
          </div>
        </div>

        <!-- Minigame anchor -->
        <div class="mg-anchor" id="mg-anchor" style="display:none;">
          <div class="mg-panel" id="mg-panel">
            <div>
              <div class="mg-header">
                <span style="font-family:var(--mono);font-size:10px;color:var(--muted);">Something's on the line...</span>
                <span class="state-badge s-free" id="state-badge">FREE</span>
              </div>
              <div class="fish-bar-wrap">
                <div class="snap-warn"></div>
                <div class="fish-zone" id="fish-zone"></div>
                <div class="fish-dot" id="fish-dot">🐠</div>
              </div>
              <div class="bar-labels"><span>← Line snaps</span><span>Caught! →</span></div>
              <div class="fish-status-label" id="fish-status-label">⚡ Full energy - watch out!</div>
              <!-- hidden stat elements kept for JS compatibility -->
              <div style="display:none">
                <div id="stam-bar"></div><div id="stam-val"></div>
                <div id="dist-bar"></div><div id="dist-val"></div>
                <div id="tens-bar"></div><div id="tens-val"></div>
                <div id="mom-bar"></div><div id="mom-val"></div>
                <div id="zone-bar"></div><div id="zone-val"></div>
                <div id="fish-bar"></div><div id="fish-val"></div>
                <div id="tug-log"></div><div id="mg-fish-name"></div>
              </div>
            </div>
            <div class="hold-wrap">
              <button class="btn-hold" id="btn-hold"
                onmousedown="holdStart(event)" onmouseup="holdEnd()"
                ontouchstart="holdStart(event)" ontouchend="holdEnd()">
                HOLD TO REEL
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- Catch flash -->
<div id="catch-flash">
  <div class="catch-box" id="catch-box">
    <div class="catch-emoji-big" id="catch-emoji"></div>
    <div class="catch-title" id="catch-title"></div>
    <div class="catch-sub" id="catch-sub"></div>
    <div class="catch-item-row" id="catch-item-row" style="display:none">
      <div class="catch-item-icon" id="catch-item-icon"></div>
      <div>
        <div class="catch-item-name" id="catch-item-name"></div>
        <div class="catch-item-pts" id="catch-item-pts"></div>
      </div>
    </div>
    <button class="btn-back" onclick="closeCatchFlash()">← Back to Selection</button>
  </div>
</div>

<div id="xp-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  currentUser = session.user;

  // Load profile (XP + background)

  currentXP = profile?.xp ?? 0;

  // Apply equipped background
  const BG_STYLES = {
    'bg-default': '',
    'bg-grid':    'background-image:radial-gradient(circle,#2a2d3a 1px,transparent 1px);background-size:24px 24px;',
    'bg-circuit': 'background-image:linear-gradient(90deg,#1a1d24 1px,transparent 1px),linear-gradient(#1a1d24 1px,transparent 1px);background-size:32px 32px;',
    'bg-plasma':  'background:linear-gradient(135deg,#0d0f14 0%,#1a0a2e 50%,#2d1a0a 100%);',
    'bg-void':    'background:radial-gradient(ellipse at center,#0d1a2e 0%,#050508 70%);',
  };
  const bgKey = profile?.bg_active || 'bg-default';
  const bgStyle = BG_STYLES[bgKey] || '';
  if (bgStyle) document.body.setAttribute('style', bgStyle);

  updateXPDisplay();
  renderLocations();
  renderBaits();
  await renderCollection();
  updateCastBtn();
  document.addEventListener('keydown',e=>{if(e.code==='Space'&&mgActive){e.preventDefault();holdStart(null);}});

function updateCastBtn() {
  const btn=document.getElementById('btn-cast');
  const hint=document.getElementById('cast-hint');
  const warn=document.getElementById('xp-warn');
  warn.style.display='none';
  if(!selLocation||!selBait){btn.disabled=true;hint.textContent='Select a location and bait';return;}
  const bait=BAIT.find(b=>b.id===selBait);
  if(currentXP<bait.xpCost){
    btn.disabled=true;hint.textContent='';
    warn.style.display='block';
    warn.textContent=`Not enough XP - need ${bait.xpCost} (you have ${currentXP})`;
    return;
  }
  btn.disabled=false;
  hint.textContent=`Costs ${bait.xpCost} XP · deducted on cast`;
}

async function startCast() {
  const bait=BAIT.find(b=>b.id===selBait);

  // Disable cast button immediately to prevent double-clicks
  document.getElementById('btn-cast').disabled=true;
  document.getElementById('selector-block').style.display='none';

  // Call server-side RPC - deducts XP + rolls fish
  const { data, error } = await sb.rpc('cast_rod', {
    p_bait_id: selBait,
    p_location_id: selLocation,
  });

  if (error || !data?.ok) {
    const msg = data?.error || error?.message || 'Cast failed';
    if (msg === 'insufficient_xp') {
      showToast('Not enough XP!');
    } else {
      showToast('Error: ' + msg);
    }
    document.getElementById('selector-block').style.display='flex';
    updateCastBtn();
    return;
  }

  // Update local XP from server response
  currentXP = data.xp;
  updateXPDisplay();
  showToast(`-${bait.xpCost} XP`);
  updateCastBtn();

  // Store server result - revealed after minigame
  currentCastId = data.cast_id;
  currentItem = {
    id:     data.fish_id,
    name:   data.fish_name,
    rarity: data.rarity,
    emoji:  ALL_ITEMS.find(i=>i.id===data.fish_id)?.emoji || '🐟',
    pts:    data.points,
  };

  // Animate rod + line
  const line=document.getElementById('fishing-line');
  const bobber=document.getElementById('bobber');
  bobber.className='bobber';
  line.style.height='0px';
  setTimeout(()=>{line.style.height='90px';},100);
  setTimeout(()=>{bobber.className='bobber idle';},600);

  playSfx('sfx-getready', 0.9);
  playSfx('sfx-cast', 0.8);
  setStatus('Waiting for a bite...','');

  const wait=2500+Math.random()*4000;
  setTimeout(()=>triggerBite(), wait);
}

function triggerBite() {
  setStatus('🐟 Fish on! Quick!','alert');
  document.getElementById('bobber').className='bobber bite';
  setTimeout(()=>openMinigame(), 700);
}

function setStatus(msg,cls) {
  const el=document.getElementById('scene-status');

}

// ══════════════════════════════════════════════

function scheduleRest() {
  burstState='resting';
  const sf=Math.max(0,stamina/mgCfg.stamMax);
  burstTimer=(mgCfg.restMin+Math.random()*(mgCfg.restMax-mgCfg.restMin))*(0.4+sf*1.4);
}
function startBurst(isGreen) {
  burstState='bursting';
  const sf=Math.max(0,stamina/mgCfg.stamMax);
  const maxT=Math.round(mgCfg.tugsMin+(mgCfg.tugsMax-mgCfg.tugsMin)*sf);
  tugsRemaining=Math.max(1,mgCfg.tugsMin+Math.floor(Math.random()*(Math.max(0,maxT-mgCfg.tugsMin)+1)));
  tugTimer=0;
  document.getElementById('tug-log').textContent=`${tugsRemaining} tug${tugsRemaining!==1?'s':''}${isGreen?' ⚡':''}`;
}
function fireTug(isGreen) {
  const sf=Math.max(0,stamina/mgCfg.stamMax);
  const isExtreme=sf>0.80||sf<0.10;
  const lungeChance=isExtreme?mgCfg.lungeChanceExtreme:mgCfg.lungeChanceBase;
  if(Math.random()<lungeChance){
    fishVel-=mgCfg.tugForceBase*mgCfg.lungeForceMulti;
    tugsRemaining=0;
    document.getElementById('tug-log').textContent='💨 Lunge!';
    return;
  }
  const force=mgCfg.tugForceBase*sf;
  fishVel-=force+(Math.random()*0.25*force);
  if(isGreen) fishVel-=mgCfg.reelingRage*sf;
}

function openMinigame() {
  const rarity=currentItem.rarity==='trash'?'common':currentItem.rarity;
  mgCfg=Object.assign({},MG_CFG[rarity]||MG_CFG.common);

  fishPos=mgCfg.fishStartMin+Math.random()*(mgCfg.fishStartMax-mgCfg.fishStartMin);
  fishVel=0;
  zonePos=Math.max(0,Math.min(1-mgCfg.zoneWidth,fishPos-mgCfg.zoneWidth/2));
  zoneSpd=0; stamina=mgCfg.stamMax; tension=0; momentum=0;
  isHolding=false; firstContact=false; reelLoopActive=false;

  document.getElementById('fish-dot').textContent='🐠'; // always generic - reveal on catch
  document.getElementById('fish-zone').style.width=(mgCfg.zoneWidth*100)+'%';
  document.getElementById('mg-fish-name').textContent=`${currentItem.emoji} ${currentItem.name}`;
  const statusEl=document.getElementById('fish-status-label');
  if(statusEl){statusEl.textContent='🎣 Get ready...';statusEl.style.color='var(--gold)';}
  document.getElementById('state-badge').textContent='READY';
  document.getElementById('state-badge').className='state-badge s-orange';
  document.getElementById('mg-anchor').style.display='block';
  document.getElementById('mg-panel').classList.add('active');

  playSfx('sfx-start', 0.9);
  playBgAction();

  // 0.5s grace - panel + HOLD button visible before physics starts
  mgActive=false; lastTs=null; burstState='resting';
  setTimeout(()=>{
    mgActive=true;
    scheduleRest();
    if(raf) cancelAnimationFrame(raf);
    raf=requestAnimationFrame(tick);
  }, 500);
}

function tick(ts) {
  if(!mgActive) return;
  if(!lastTs){lastTs=ts;raf=requestAnimationFrame(tick);return;}
  const dt=Math.min((ts-lastTs)/1000,0.08);
  lastTs=ts;

  const cfg=mgCfg;
  const sf=Math.max(0,stamina/cfg.stamMax);
  const inZone=fishPos>=zonePos&&fishPos<=(zonePos+cfg.zoneWidth);
  const isGreen=isHolding&&inZone;
  const inDanger=fishPos<cfg.snapZone;

  // Burst
  if(burstState==='resting'){
    burstTimer-=dt;
    if(burstTimer<=0) startBurst(isGreen);
  } else {
    tugTimer-=dt;
    if(tugTimer<=0){
      if(tugsRemaining>0){fireTug(isGreen);tugsRemaining--;tugTimer=cfg.tugDelay;}
      else scheduleRest();
    }
  }

  // Stamina
  if(isGreen){
    stamina=Math.max(0,stamina-cfg.stamDrainReel*dt);
    const cap=cfg.stamMax*cfg.stamRecoverCap;
    if(stamina<cap) stamina=Math.min(cap,stamina+(cap-stamina)*cfg.stamRecoverRate*0.2*dt*60);
  } else if(inZone){
    const cap=cfg.stamMax*cfg.stamRecoverCap;
    if(stamina<cap) stamina=Math.min(cap,stamina+(cap-stamina)*cfg.stamRecoverRate*0.5*dt*60);
  } else {
    const cap=cfg.stamMax*cfg.stamRecoverCap;
    if(stamina<cap) stamina=Math.min(cap,stamina+(cap-stamina)*cfg.stamRecoverRate*dt*60);
  }
  if(stamina<12&&Math.random()<cfg.stamFlickerChance){
    stamina=Math.min(cfg.stamMax*0.18,stamina+cfg.stamFlickerAmt);
    document.getElementById('tug-log').textContent='⚡ Second wind!';
  }

  // Momentum
  if(isGreen) momentum=Math.min(100,momentum+cfg.momentumBuildRate*dt);
  else        momentum=Math.max(0,momentum-cfg.momentumDrainRate*dt);

  // First contact + tension
  if(inZone) firstContact=true;
  if(!firstContact){
    tension=0;
  } else if(inDanger) tension=Math.min(100,tension+cfg.snapBuildRate*dt);
  else if(!inZone)    tension=Math.min(100,tension+cfg.tensionBuildRate*dt);
  else                tension=Math.max(0,tension-cfg.tensionDrainRate*dt);

  // Fish forces
  if(isGreen){
    const ex=Math.max(0,1-(sf/cfg.exhaustThresh));
    const reelF=cfg.reelForceBase*(1+cfg.reelForceExhaust*ex);
    const momB=(momentum/100)*cfg.momentumReelBonus;
    fishVel+=(reelF+momB)*dt;
  } else {
    fishVel+=((cfg.neutral-fishPos)*cfg.neutralForce)*dt*60;
    if(sf<0.2) fishVel*=Math.pow(0.25,dt*60);
  }

  // Physics
  fishVel*=Math.pow(cfg.damping,dt*60);
  fishPos+=fishVel*dt;
  fishPos=Math.max(0,Math.min(1,fishPos));

  // Zone
  if(isHolding){
    zoneSpd=Math.min(cfg.zoneMaxReelSp,zoneSpd+cfg.zoneReelAccel*dt);
    zonePos+=zoneSpd*dt;
  } else {
    zoneSpd=0; zonePos-=cfg.zoneDriftSp*dt;
  }
  zonePos=Math.max(0,Math.min(1-cfg.zoneWidth,zonePos));

  if(fishPos>=cfg.winDist){endMinigame(true);return;}
  if(tension>=100)        {endMinigame(false);return;}

  updateMgUI(isGreen,inZone,inDanger);
  raf=requestAnimationFrame(tick);
}

function updateMgUI(isGreen,inZone,inDanger) {
  const cfg=mgCfg;
  document.getElementById('fish-dot').style.left=(fishPos*100)+'%';

  const zone=document.getElementById('fish-zone');
  zone.style.left=(zonePos*100)+'%';
  zone.className='fish-zone';
  if(!isGreen&&inZone) zone.classList.add('orange');
  else if(!inZone)     zone.classList.add('off');

  const badge=document.getElementById('state-badge');
  if(isGreen)       {badge.textContent='REELING';    badge.className='state-badge s-reel';}
  else if(inZone)   {badge.textContent='IN ZONE';    badge.className='state-badge s-orange';}
  else if(inDanger) {badge.textContent='DANGER!';    badge.className='state-badge s-free';}
  else              {badge.textContent='FREE';        badge.className='state-badge s-free';}

  // Fish status label - based on stamina %
  const sp=(stamina/cfg.stamMax)*100;
  const statusEl=document.getElementById('fish-status-label');
  if(statusEl){
    let label,color;
    if(sp<=5)        {label='😵 Exhausted - barely fighting';  color='#4ade80';}
    else if(sp<=20)  {label='😮‍💨 Tired - slowing down';         color='#86efac';}
    else if(sp<=40)  {label='😤 Weakening - keep reeling';     color='#fbbf24';}
    else if(sp<=60)  {label='💪 Struggling hard';              color='#fb923c';}
    else if(sp<=80)  {label='🔥 Fighting strong';              color='#f87171';}
    else             {label='⚡ Full energy - watch out!';     color='#ef4444';}
    statusEl.textContent=label;
    statusEl.style.color=color;
  }
}

function holdStart(e) {
  if(e) e.preventDefault();
  isHolding=true;
  document.getElementById('btn-hold').classList.add('held');
  startReelLoop();
}
function holdEnd() {
  isHolding=false;
  document.getElementById('btn-hold').classList.remove('held');
  stopReelLoop();
}

function endMinigame(success) {
  mgActive=false; isHolding=false;
  document.getElementById('btn-hold').classList.remove('held');
  if(raf) cancelAnimationFrame(raf);
  document.getElementById('mg-panel').classList.remove('active');
  document.getElementById('mg-anchor').style.display='none';

  // Stop minigame audio
  stopReelLoop();
  stopBg();

  // Reset rod scene
  document.getElementById('fishing-line').style.height='0px';
  document.getElementById('bobber').className='bobber';
  setStatus('','');

  // Tell the server the minigame outcome - it logs to fish_catches only on win
  // Store the promise so closeCatchFlash can await it before refreshing collection
  window._resolvePromise = sb.rpc('resolve_cast', { p_cast_id: currentCastId, p_won: success });

  if(success){
    const rec={
      id:currentItem.id, name:currentItem.name,
      rarity:currentItem.rarity, emoji:currentItem.emoji,
      pts:currentItem.pts,
    };
    playCatchSequence(); // plays sfx-catch + chime, then fires playBgIdle when done
    showCatchFlash(true,rec);
  } else {
    const missEl = new Audio('assets/audio/sfx-miss.mp3');
    missEl.volume = Math.min(1, masterVolume * 0.85);
    missEl.play().catch(()=>{});
    missEl.onended = () => { playBgIdle(); };
    showCatchFlash(false,null);
  }
}

//  CATCH FLASH
// ══════════════════════════════════════════════

function showCatchFlash(success,rec) {
  const box=document.getElementById('catch-box');
  const itemRow=document.getElementById('catch-item-row');

  if(success){
    const isTrash=rec.rarity==='trash';
    const isLegendary=rec.rarity==='legendary';
    const isUncommon=rec.rarity==='uncommon';
    box.className='catch-box '+(isTrash?'trash-catch':'success');
    document.getElementById('catch-emoji').textContent=isTrash?'😅':isLegendary?'🏆':isUncommon?'✨':'🎉';
    const titleEl=document.getElementById('catch-title');
    titleEl.textContent=isTrash?'You caught... trash?':isLegendary?'LEGENDARY CATCH!!':isUncommon?'Nice catch!':'You caught it!';
    titleEl.style.fontSize=isLegendary?'24px':isUncommon?'20px':'19px';
    titleEl.style.color=isLegendary?'var(--gold)':isUncommon?'var(--blue)':'var(--text)';
    if(isLegendary) titleEl.style.textShadow='0 0 16px rgba(201,169,110,0.5)';
    else titleEl.style.textShadow='none';
    document.getElementById('catch-sub').textContent=isTrash?'At least it\'s in the collection':isLegendary?'An extraordinary find!':'Added to your collection';
    itemRow.style.display='flex';
    const catchIconEl=document.getElementById('catch-item-icon');
    const catchImgPath=rec.rarity==='trash'?`assets/trash_${rec.id}.png`:`assets/fish_${rec.id}.png`;
    catchIconEl.innerHTML=`<img src="${catchImgPath}" alt="${rec.name}" onerror="this.parentElement.innerHTML='<span class=\\'catch-item-icon-emoji\\'>${rec.emoji}</span>'">`;
    document.getElementById('catch-item-name').textContent=rec.name;
    const ptsEl=document.getElementById('catch-item-pts');
    ptsEl.textContent=rec.pts>0?`+${rec.pts} pts`:'No points';
    ptsEl.className='catch-item-rarity catch-rarity-'+rec.rarity;
  } else {
    box.className='catch-box fail';
    document.getElementById('catch-emoji').textContent='😔';
    document.getElementById('catch-title').textContent='One got away!';
    document.getElementById('catch-sub').textContent='Better luck next cast';
    itemRow.style.display='none';
  }

  document.getElementById('catch-flash').classList.add('active');
}

async function closeCatchFlash() {
  document.getElementById('catch-flash').classList.remove('active');
  document.getElementById('selector-block').style.display='flex';
  // Wait for resolve_cast to finish before refreshing collection
  if (window._resolvePromise) {
    await window._resolvePromise;
    window._resolvePromise = null;
  }
  await renderCollection();
  updateCastBtn();
}

// ══════════════════════════════════════════════
//  COLLECTION (reads from Supabase)
// ══════════════════════════════════════════════

async function renderCollection() {
  if (!currentUser) return;

  const { data: catches } = await sb
    .from('fish_catches')
    .select('fish_id, fish_name, rarity, points')
    .eq('user_id', currentUser.id)
    .eq('won', true);

  const rows = catches || [];
  const counts={}, ptsEarned={};
  rows.forEach(c=>{
    counts[c.fish_id]=(counts[c.fish_id]||0)+1;
    ptsEarned[c.fish_id]=(ptsEarned[c.fish_id]||0)+(c.points||0);
  });

  const totalPts=rows.reduce((s,c)=>s+(c.points||0),0);
  document.getElementById('coll-total-pts').textContent=totalPts;

  const list=document.getElementById('coll-list');
  if(rows.length===0){
    list.innerHTML='<div class="coll-empty">Cast your first line!</div>';
    return;
  }

  const rarityOrder={legendary:0,uncommon:1,common:2,trash:3};
  const caughtItems=ALL_ITEMS.filter(f=>counts[f.id]);
  caughtItems.sort((a,b)=>rarityOrder[a.rarity]-rarityOrder[b.rarity]||a.name.localeCompare(b.name));

  list.innerHTML='';
  caughtItems.forEach(item=>{
    const div=document.createElement('div');
    div.className=`coll-item ${item.rarity}`;
    const pts=POINTS[item.rarity]||0;
    const totalItemPts=ptsEarned[item.id]||0;
    const imgPath=item.rarity==='trash'?`assets/trash_${item.id}.png`:`assets/fish_${item.id}.png`;
    const iconHtml=`<img src="${imgPath}" alt="${item.name}" onerror="this.parentElement.innerHTML='<span class=\\'coll-icon-emoji\\'>${item.emoji}</span>'">`;
    div.innerHTML=`
      <div class="coll-icon">${iconHtml}</div>
      <div class="coll-info">
        <div class="coll-name">${item.name}</div>
        <div class="coll-pts-each">${pts>0?pts+' pts each':'No pts'}</div>
      </div>
      <div class="coll-right">
        <div class="coll-count">×${counts[item.id]}</div>
        <div class="coll-item-pts">${totalItemPts>0?totalItemPts+' pts':''}</div>
      </div>
    `;
    list.appendChild(div);
  });
}

boot();

// ══════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════

const AUDIO_FILES = {
  'bg-idle':        'assets/audio/bg-idle.mp3',
  'bg-action':      'assets/audio/bg-action.mp3',
  'sfx-getready':   'assets/audio/sfx-getready.mp3',
  'sfx-cast':       'assets/audio/sfx-cast.mp3',
  'sfx-start':      'assets/audio/sfx-start.mp3',
  'sfx-reel':       'assets/audio/sfx-reel.mp3',
  'sfx-catch':      'assets/audio/sfx-catch.mp3',
  'sfx-catch-chime':'assets/audio/sfx-catch-chime.mp3',
  'sfx-miss':       'assets/audio/sfx-miss.mp3',
};

const audio = {};
let audioReady = false;
let isMuted = true; // default off
let masterVolume = 0.6;
let reelLoopActive = false;

function initAudio() {
  if (audioReady) return;
  audioReady = true;
  Object.entries(AUDIO_FILES).forEach(([key, src]) => {
    const el = new Audio(src);
    el.preload = 'auto';
    if (key === 'bg-idle' || key === 'bg-action' || key === 'sfx-reel') {
      el.loop = true;
    }
    audio[key] = el;
  });
}

function playBgIdle() {
  if (isMuted || !audioReady) return;
  stopBg();
  audio['bg-idle'].currentTime = 0;
  audio['bg-idle'].volume = masterVolume * 0.8;
  audio['bg-idle'].play().catch(()=>{});
}

function playBgAction() {
  if (isMuted || !audioReady) return;
  stopBg();
  audio['bg-action'].currentTime = 0;
  audio['bg-action'].volume = masterVolume;
  audio['bg-action'].play().catch(()=>{});
}

function stopBg() {
  audio['bg-idle']?.pause();
  if (audio['bg-idle']) audio['bg-idle'].currentTime = 0;
  audio['bg-action']?.pause();
  if (audio['bg-action']) audio['bg-action'].currentTime = 0;
}

function playSfx(key, relVolume) {
  if (isMuted || !audioReady || !audio[key]) return;
  audio[key].pause();
  audio[key].currentTime = 0;
  audio[key].volume = Math.min(1, masterVolume * (relVolume ?? 1));
  audio[key].play().catch(()=>{});
}

// Play catch voice + chime simultaneously, then bg-idle after catch voice ends
function playCatchSequence() {
  // sfx-catch and sfx-catch-chime play at the same time
  const catchEl = new Audio('assets/audio/sfx-catch.mp3');
  catchEl.volume = Math.min(1, masterVolume * 0.9);
  catchEl.play().catch(()=>{});
  catchEl.onended = () => { playBgIdle(); };

  playSfx('sfx-catch-chime', 0.8);
}

function startReelLoop() {
  if (isMuted) return;
  reelLoopActive = true;
  const r = new Audio('assets/audio/sfx-reel.mp3');
  r.loop = true;
  r.volume = masterVolume * 0.7;
  r.play();
  window._reelEl = r;
}

function stopReelLoop() {
  reelLoopActive = false;
  if (window._reelEl) { window._reelEl.pause(); window._reelEl = null; }
}

function toggleMute() {
  initAudio();
  isMuted = !isMuted;
  const btn = document.getElementById('btn-mute');
  const slider = document.getElementById('volume-slider');
  btn.textContent = isMuted ? '🔇' : '🔊';
  slider.disabled = isMuted;
  slider.style.opacity = isMuted ? '0.4' : '1';
  slider.style.pointerEvents = isMuted ? 'none' : 'auto';
  if (isMuted) {
    stopBg();
    stopReelLoop();
    Object.values(audio).forEach(a => { try { a.pause(); } catch(e){} });
  } else {
    if (mgActive) playBgAction();
    else playBgIdle();
  }
}

function setVolume(val) {
  masterVolume = parseFloat(val);
  // Update any currently playing audio live
  if (audio['bg-idle'])   audio['bg-idle'].volume   = masterVolume * 0.8;
  if (audio['bg-action']) audio['bg-action'].volume  = masterVolume;
  if (audio['sfx-reel'])  audio['sfx-reel'].volume   = Math.min(1, masterVolume * 0.7);
}
