<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Physics Black Belt — Login</title>
<link rel="stylesheet" href="css/app.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;overflow:hidden;}
.login-wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:0 20px;}
.belt-stripes{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-bottom:36px;}
.belt-stripes span{flex:1;}
.emblem{text-align:center;margin-bottom:32px;}
.emblem-icon{
  width:60px;height:60px;border-radius:50%;
  background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.25);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;font-size:24px;
}
.emblem h1{
  font-family:'Orbitron',monospace;font-size:18px;font-weight:700;
  color:#f0f0f0;letter-spacing:0.08em;margin-bottom:4px;
}
.emblem h1 em{color:#c9a96e;font-style:normal;}
.emblem p{font-size:11px;color:#444;font-family:'IBM Plex Mono',monospace;letter-spacing:0.08em;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px!important;}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:4px;line-height:1;}
.back-link{display:block;text-align:center;margin-top:16px;font-size:10px;color:#333;font-family:'IBM Plex Mono',monospace;text-decoration:none;transition:color 0.15s;letter-spacing:0.05em;}
.back-link:hover{color:#666;}
</style>
</head>
<body>
<div class="login-wrap anim-rise anim-rise-1">
  <div class="belt-stripes">
    <span style="background:#f0f0f0;"></span>
    <span style="background:#f5c842;"></span>
    <span style="background:#f5852a;"></span>
    <span style="background:#4a90d9;"></span>
    <span style="background:#a0623a;"></span>
    <span style="background:#555;"></span>
  </div>
  <div class="emblem">
    <div class="emblem-icon">⚡</div>
    <h1>PHYSICS <em>BLACK BELT</em></h1>
    <p>bryanvincentking.com · K–12 Physics Mastery</p>
  </div>
  <div class="card">
    <div class="card-title">Student & Teacher Access</div>
    <div id="msg-box" class="msg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email-input" placeholder="yourname@school.edu.ph" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password-input" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="pw-toggle" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>
    <button class="btn btn-gold" id="submit-btn" onclick="doLogin()" style="width:100%;justify-content:center;margin-top:4px;">Sign In →</button>
    <div class="divider"><span>need access?</span></div>
    <p style="font-size:11px;color:#444;font-family:'IBM Plex Mono',monospace;line-height:1.7;text-align:center;">
      Your teacher will provide your login credentials.<br>
      Contact your teacher if you cannot access your account.
    </p>
  </div>
  <a class="back-link" href="/index.html">← Back to bryanvincentking.com</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://vmhfkqqsrokkehkejxdk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtaGZrcXFzcm9ra2Voa2VqeGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjE0MzYsImV4cCI6MjA5MjY5NzQzNn0.6EDkxTi675qEEiz12PzgYty1MmbJdIW2s86PcH2vB0U';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showMsg(t,type){const b=document.getElementById('msg-box');b.textContent=t;b.className='msg '+type+' show';}
function togglePw(){const i=document.getElementById('password-input');i.type=i.type==='password'?'text':'password';}

async function doLogin(){
  const email=document.getElementById('email-input').value.trim().toLowerCase();
  const password=document.getElementById('password-input').value;
  const btn=document.getElementById('submit-btn');
  if(!email||!password){showMsg('Please enter both email and password.','error');return;}
  btn.disabled=true;btn.textContent='Signing in...';
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){showMsg('Incorrect email or password. Contact your teacher for help.','error');btn.disabled=false;btn.textContent='Sign In →';return;}
  window.location.href='app.html';
}

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session) window.location.href='app.html';
})();

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
